# fly.toml app configuration file generated for glosa-ai on 2026-07-13T01:17:44+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'glosa-ai'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  MODEL = 'claude-sonnet-5'
  PORT = '8080'
  TRANSLATION_DB_PATH = '/data/translations.db'

[[mounts]]
  source = 'glosa_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
